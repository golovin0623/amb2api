name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME || 'golovin0623' }}
  DOCKER_REPOSITORY: amb2api

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio hypothesis

      - name: Run tests
        run: python -m pytest -q

  config-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "Docker compose config is valid"

  docker-build-push:
    needs:
      - test
      - config-validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          image="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}"
          short_sha="${GITHUB_SHA::7}"
          tags=("${image}:sha-${short_sha}")

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=("${image}:main" "${image}:latest")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            tags+=("${image}:${version}" "${image}:latest")
          fi

          {
            echo "tags<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Will push image tags:"
          printf '  %s\n' "${tags[@]}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:buildcache,mode=max

  deploy:
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DEPLOY_WEBHOOK_URL != '' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger deployment webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail

          response_file=$(mktemp)
          auth_args=()
          if [ -n "${DEPLOY_WEBHOOK_TOKEN:-}" ]; then
            auth_args=(-H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}")
          fi

          http_code=$(curl -sS -X POST \
            --max-time 900 \
            --connect-timeout 10 \
            --retry 2 \
            --retry-delay 2 \
            --retry-connrefused \
            "${auth_args[@]}" \
            -o "$response_file" \
            -w "%{http_code}" \
            "$DEPLOY_WEBHOOK_URL")

          echo "Webhook HTTP status: $http_code"
          echo "Webhook response:"
          cat "$response_file"

          if [ "$http_code" != "200" ]; then
            echo "Deployment failed, webhook status: $http_code"
            exit 1
          fi

          echo "Deployment completed successfully"

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

# 并发控制策略 (仿 AetherBlog):
#   - PR: 同一 ref 上的旧运行被取消, 节省 runner (反正会被新 push 覆盖)
#   - push to main / tag v*: 每次给独立 group, 让 gitleaks / test /
#     config-validate 等"检查类" job 在多次连续合并时完全并行 ——
#     共享 group 会让后到的 push 整段排队
#
# deploy / build job 单独通过 job 级 `concurrency` 串行化, 见各 job 内部
# 声明, 防止后部署的旧 commit 把更新的服务版本覆盖回去
concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request'
        && format('{0}-pr-{1}', github.workflow, github.ref)
        || format('{0}-push-{1}', github.workflow, github.run_id)
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 工作流级权限默认收敛为只读. 需要写权限的单独 job (如 trivy 上传 SARIF)
# 必须在本地重新声明所需权限. 防止被篡改的 Action 偷偷利用 GITHUB_TOKEN
# 默认的读写权限.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME || 'golovin0623' }}
  DOCKER_REPOSITORY: amb2api

jobs:
  # ==========================================================================
  # Gitleaks secret scanning: 阻止硬编码 secret / JWT / API key 进入 diff
  # ==========================================================================
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks 需要全历史扫描每次 diff

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        # 当前不阻断 —— 作为可见性信号, 等基线清理完后再切换为强阻断
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Python 测试套件
  # ==========================================================================
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        # CLAUDE.md 第 23 行说明: hypothesis 在 [dependency-groups].dev,
        # 不在主依赖. 当前 Python 3.12 不支持 `pip install --group dev`
        # (需 3.13+), 所以单独装 dev tools.
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio hypothesis

      - name: Run tests
        run: python -m pytest -q

  # ==========================================================================
  # Docker Compose 配置校验
  # ==========================================================================
  config-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "✅ Docker compose config is valid"

  # ==========================================================================
  # 条件性 Docker 镜像构建: 仅 push 到 main 或 v* tag, 且 Docker 凭证已配置
  # ==========================================================================
  docker-build-push:
    needs: [test, config-validate]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    # 同 ref 的多次 push build 串行 —— 避免后完成的 build push :latest /
    # :main 把先完成的覆盖回去 (导致 deploy 拉到错误版本).
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      image_pushed: ${{ steps.docker-creds.outputs.enabled }}
      short_sha: ${{ steps.prep.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker credentials
        id: docker-creds
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_USERNAME:-}" ] || [ -z "${DOCKER_PASSWORD:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker credentials not configured. Skip docker build/push."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.docker-creds.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.docker-creds.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.docker-creds.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image tags
        if: steps.docker-creds.outputs.enabled == 'true'
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          image="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}"
          short_sha="${GITHUB_SHA::7}"
          tags=("${image}:sha-${short_sha}")

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=("${image}:main" "${image}:latest")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            tags+=("${image}:${version}" "${image}:latest")
          fi

          {
            echo "tags<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

          echo "Will push image tags:"
          printf '  %s\n' "${tags[@]}"

      - name: Build and push Docker image
        if: steps.docker-creds.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          # 双缓存策略 (仿 AetherBlog): GHA 缓存用于 CI 增量构建加速,
          # registry 缓存用于持久备份, 跨 runner 也能命中.
          cache-from: |
            type=gha,scope=amb2api
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:buildcache
          cache-to: |
            type=gha,scope=amb2api,mode=max
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:buildcache,mode=max

  # ==========================================================================
  # Trivy 镜像 CVE 扫描: 仅 main 分支构建后执行
  # ==========================================================================
  trivy-scan:
    needs: docker-build-push
    if: |
      always() && needs.docker-build-push.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.docker-build-push.outputs.image_pushed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # 可选: 写入 Security → Code scanning alerts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan amb2api image
        # v0.35.0 用 SHA 钉死 setup-trivy 不再受 tag 移动影响 (见 AetherBlog
        # ci-cd.yml 同名 step 注释).
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:sha-${{ needs.docker-build-push.outputs.short_sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # 先观测, 不阻断; 稳定后改为 1

  # ==========================================================================
  # 自动部署 (Webhook 触发): 优先 HMAC-SHA256 签名, 兼容 Bearer Token
  # ==========================================================================
  deploy:
    needs: docker-build-push
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.docker-build-push.outputs.image_pushed == 'true'
    # main 多次 push 的 deploy 排队执行, 按 commit 顺序滚动重启.
    # 不能 cancel-in-progress: 跳过中间任意一次会让该 commit 的镜像永远
    # 上不到服务器.
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 部署方式: GitHub Actions 通过 SSH 登录服务器, 在 compose 目录里执行
      # `docker compose pull && up -d` 拉取并切换到刚 push 的新镜像.
      # 不需要在应用里开 webhook 接口, 也不需要把 docker.sock 挂进容器.
      #
      # 需要在仓库 Settings → Secrets and variables → Actions 配置:
      #   DEPLOY_SSH_HOST      服务器 IP 或域名 (必填, 缺失则本 job 直接跳过)
      #   DEPLOY_SSH_USER      SSH 用户名 (如 root)
      #   DEPLOY_SSH_KEY       SSH 私钥全文 (推荐) —— 与 DEPLOY_SSH_PASSWORD 二选一
      #   DEPLOY_SSH_PASSWORD  SSH 登录密码 —— 与 DEPLOY_SSH_KEY 二选一
      #   DEPLOY_SSH_PORT      SSH 端口 (可选, 默认 22)
      #   DEPLOY_PATH          服务器上 docker-compose.yml 所在目录 (可选, 默认 /root/amb2api)
      - name: Check SSH deploy config
        id: ssh
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SSH_HOST:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DEPLOY_SSH_HOST 未配置, 跳过自动部署. 在仓库 Settings → Secrets 里配好 SSH secrets 即可启用."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.ssh.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          envs: DEPLOY_PATH
          command_timeout: 10m
          script: |
            set -e
            cd "${DEPLOY_PATH:-/root/amb2api}"
            echo "==> 部署目录: $(pwd)"
            echo "==> 拉取最新镜像..."
            docker compose pull
            echo "==> 重启服务..."
            docker compose up -d
            echo "==> 清理旧镜像..."
            docker image prune -f
            echo "✅ 部署完成"

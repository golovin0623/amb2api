name: Quick Docker Build

# 简化版手动构建工作流 —— 跳过测试与 CVE 扫描, 仅构建并推送镜像.
# 适用于紧急修复 / 快速迭代验证. 与 ci-cd.yml 共享 buildx 缓存 (scope=amb2api,
# registry buildcache), 大多数情况下命中率较高.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to publish (e.g. v0.6.1 or hotfix-20260508)"
        required: true
        default: "latest"
      publish_latest:
        description: "Also publish :latest tag"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME || 'golovin0623' }}
  DOCKER_REPOSITORY: amb2api

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker credentials
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_USERNAME:-}" ] || [ -z "${DOCKER_PASSWORD:-}" ]; then
            echo "DOCKER_USERNAME / DOCKER_PASSWORD is required for quick build."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          image="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}"
          short_sha="${GITHUB_SHA::7}"
          tags=("${image}:${{ github.event.inputs.version }}" "${image}:sha-${short_sha}")

          if [[ "${{ github.event.inputs.publish_latest }}" == "true" ]]; then
            tags+=("${image}:latest")
          fi

          {
            echo "tags<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Will push image tags:"
          printf '  %s\n' "${tags[@]}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          # 与 ci-cd.yml 共用 scope, 命中率最高
          cache-from: |
            type=gha,scope=amb2api
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:buildcache
          cache-to: |
            type=gha,scope=amb2api,mode=max
            type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:buildcache,mode=max

      - name: Success notification
        run: |
          echo "✅ Successfully built and pushed:"
          printf '   %s\n' ${{ steps.prep.outputs.tags }}
